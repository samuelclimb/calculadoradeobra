services:
  - type: web
    name: obra-custo-builder
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm run build:deploy
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
