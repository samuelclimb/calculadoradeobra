kind = "web"
previewPath = "/"
title = "Calculadora de Custo Invisível"
version = "1.0.0"
id = "artifacts/calculadora"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22518

[services.development]
run = "pnpm --filter @workspace/calculadora run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calculadora", "run", "build" ]
serve = "static"
publicDir = "artifacts/calculadora/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22518"
BASE_PATH = "/"
